name: fitkart_app
description: FitKart - Walk to Earn FitKart Coins (FKC)

publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Supabase
  supabase_flutter: ^2.3.4
  google_sign_in: ^6.2.1

  # Step counting / Health
  health: ^12.0.0
  pedometer: ^4.0.2
  sensors_plus: ^5.0.1

  # Location / Maps
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.1

  # Charts
  fl_chart: ^0.67.0

  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  badges: ^3.1.2

  # Storage / Prefs
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  image_picker: ^1.1.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
